<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NISHA MASTER DASHBOARD</title>
    <link rel="stylesheet" href="/static/style.css">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Agora SDK -->
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N.js"></script>
</head>
<body>
    <div class="dashboard-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <i data-lucide="shield-check" color="#39d353"></i>
                <h2>NISHA <span>MASTER</span></h2>
            </div>
            
            <p class="nav-label">Connected Agents</p>
            <div id="agentList" class="agent-list">
                <!-- Agent items injected here -->
                <div class="empty-agents" style="color: #444; font-size: 0.85rem; padding: 10px;">Waiting for signal...</div>
            </div>

            <div style="margin-top: auto; padding-top: 1rem; border-top: 1px solid #222;">
                <div style="display: flex; justify-content: space-between; font-size: 0.8rem; color: #666;">
                    <span>Active Nodes</span>
                    <span id="activeCount">0</span>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header>
                <div>
                    <h1 id="selectedAgentName">Monitoring Center</h1>
                    <p id="selectedAgentStatus">Select an agent from the sidebar to view feed</p>
                </div>
                <div class="status-indicator">
                    <div id="globalStatusDot" class="dot offline"></div>
                    <span id="globalStatusText">NO SIGNAL</span>
                </div>
            </header>

            <div id="streamDisplay" class="stream-container hidden">
                <!-- Video Section -->
                <div class="video-player-card">
                    <div class="video-wrapper">
                        <div id="remote-video" class="stream-video"></div>
                        <img id="mainVideo" class="stream-video hidden" alt="Live Feed" />
                        <canvas id="videoCanvas" class="stream-video hidden"></canvas>
                        
                        <div class="video-overlay">
                            <div class="overlay-top">
                                <div class="stats-badges">
                                    <span class="badge badge-live">● LIVE</span>
                                    <span id="badgeClips" class="badge">0 CLIPS</span>
                                    <span id="badgeBandwidth" class="badge">0 kbps</span>
                                </div>
                            </div>
                            
                            <div class="overlay-bottom">
                                <div id="locationBadge" class="location-badge hidden">
                                    <i data-lucide="map-pin" size="14"></i>
                                    <span id="coordsText">0.00000, 0.00000</span>
                                </div>
                                <button id="flipCamBtn" class="flip-btn">
                                    <i data-lucide="refresh-cw" size="14"></i>
                                    FLIP CAMERA
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Audio Section -->
                <div id="audioSection" class="audio-player-card hidden">
                    <div class="audio-header">
                        <div class="audio-title">
                            <i data-lucide="mic" size="18" color="#39d353"></i>
                            <span>LIVE AUDIO FEED</span>
                        </div>
                        <div class="stats-badges">
                            <span id="badgeAudioClips" class="badge">0 CLIPS</span>
                            <span id="badgeAudioQueue" class="badge">0 QUEUED</span>
                        </div>
                    </div>
                    
                    <audio id="mainAudio" autoplay style="display: none;"></audio>
                    
                    <div id="visualizer" class="audio-visualizer">
                        <!-- Bars generated by JS -->
                    </div>
                </div>
            </div>

            <!-- Empty State -->
            <div id="emptyState" class="empty-state">
                <i data-lucide="monitor" size="64" stroke-width="1"></i>
                <h2>No Active Selection</h2>
                <p>Select a sentinel node to begin surveillance</p>
            </div>
        </main>
    </div>

    <script src="/static/dashboard.js?v=6"></script>
    <script>
        // Initialize Lucide icons
        lucide.createIcons();
    </script>
</body>
</html>
